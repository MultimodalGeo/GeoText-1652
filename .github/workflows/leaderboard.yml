name: Leaderboard

on:
  pull_request:
    paths:
      - "LEADERBOARD.md"
      - "leaderboard/data.json"
      - "scripts/render_leaderboard.py"
      - ".github/workflows/leaderboard.yml"
  push:
    branches:
      - main
    paths:
      - "LEADERBOARD.md"
      - "leaderboard/data.json"
      - "scripts/render_leaderboard.py"
      - ".github/workflows/leaderboard.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Validate generated leaderboard
        run: python3 scripts/render_leaderboard.py --check
